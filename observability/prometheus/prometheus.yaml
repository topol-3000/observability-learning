global:
  scrape_interval: 15s
  scrape_timeout: 5s
  evaluation_interval: 15s

storage:
  tsdb:
    out_of_order_time_window: 0s

otlp:
  promote_resource_attributes:
    - service.name
    - service.namespace
    - deployment.environment.name

rule_files:
  - /etc/prometheus/rules/*.yaml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: otel_collector
    static_configs:
      - targets: [otel-collector:8888]

  - job_name: tempo
    metrics_path: /metrics
    static_configs:
      - targets: [tempo:3200]

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets: [loki:3100]

  - job_name: alloy
    metrics_path: /metrics
    static_configs:
      - targets: [alloy:12345]

  - job_name: blackbox_exporter
    static_configs:
      - targets: [blackbox-exporter:9115]

  - job_name: api_blackbox
    metrics_path: /probe
    params:
      module: [http_ready]
    static_configs:
      - targets: [http://traefik:8080/health/ready]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
