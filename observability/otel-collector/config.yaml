extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  file_storage:
    directory: /var/lib/otelcol/storage
    create_directory: true
    timeout: 1s
    compaction:
      directory: /var/lib/otelcol/storage
      on_start: true
      on_rebound: true

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 128
    spike_limit_mib: 32
  resource/identity:
    attributes:
      - key: service.instance.id
        from_attribute: host.name
        action: insert
      - key: service.namespace
        value: ${env:OTEL_SERVICE_NAMESPACE}
        action: upsert
      - key: deployment.environment.name
        value: ${env:DEPLOYMENT_ENVIRONMENT}
        action: upsert
  attributes/safety:
    actions:
      - key: http.request.header.authorization
        action: delete
      - key: http.request.header.cookie
        action: delete
      - key: http.request.body
        action: delete
      - key: http.response.body
        action: delete
      - key: http.url
        action: delete
      - key: http.target
        action: delete
      - key: url.full
        action: delete
      - key: url.path
        action: delete
      - key: url.query
        action: delete
  batch:
    timeout: 1s
    send_batch_size: 512
    send_batch_max_size: 1024

exporters:
  otlp_grpc/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
    timeout: 5s
    sending_queue:
      enabled: true
      num_consumers: 2
      queue_size: 2048
      storage: file_storage
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 5s
      max_elapsed_time: 30s

service:
  extensions: [health_check, file_storage]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource/identity, attributes/safety, batch]
      exporters: [otlp_grpc/tempo]
  telemetry:
    logs:
      encoding: json
      level: info
