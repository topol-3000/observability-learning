name: observability-demo

services:
  traefik:
    image: traefik:v3.7.8
    command:
      - --configFile=/etc/traefik/traefik.yaml
    ports:
      - "127.0.0.1:${HTTP_PORT:-8080}:8080"
    volumes:
      - ./observability/traefik/traefik.yaml:/etc/traefik/traefik.yaml:ro
      # Local-learning exception: this socket exposes sensitive Docker metadata.
      # A production deployment should use a restricted API proxy or native discovery.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - edge
      - ingress
      - telemetry
    depends_on:
      otel-collector:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true
    restart: unless-stopped
    stop_grace_period: 35s
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

  api:
    image: observability-demo-api:${APP_VERSION:-0.1.0}
    build:
      context: ./app
      target: runtime
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
    scale: 4
    expose:
      - "8000"
    environment:
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-observability-demo-api}
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-learning}
      DEPLOYMENT_ENVIRONMENT: ${DEPLOYMENT_ENVIRONMENT:-local}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_TRACES_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_TRACES_TIMEOUT: "5"
      OTEL_BSP_EXPORT_TIMEOUT: "5000"
      OTEL_BSP_SCHEDULE_DELAY: "500"
      OTEL_PROPAGATORS: tracecontext
    depends_on:
      otel-collector:
        condition: service_healthy
    networks:
      - edge
      - telemetry
    labels:
      traefik.enable: "true"
      traefik.http.routers.api.entrypoints: web
      traefik.http.routers.api.rule: PathPrefix(`/`)
      traefik.http.routers.api.service: api
      traefik.http.routers.api-health.entrypoints: web
      traefik.http.routers.api-health.rule: Path(`/health/live`) || Path(`/health/ready`)
      traefik.http.routers.api-health.service: api
      traefik.http.routers.api-health.observability.accesslogs: "false"
      traefik.http.routers.api-health.observability.tracing: "false"
      traefik.http.services.api.loadbalancer.server.port: "8000"
      traefik.http.services.api.loadbalancer.healthcheck.path: /health/ready
      traefik.http.services.api.loadbalancer.healthcheck.interval: 5s
      traefik.http.services.api.loadbalancer.healthcheck.timeout: 2s
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true
    restart: unless-stopped
    stop_grace_period: 35s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.153.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    environment:
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-learning}
      DEPLOYMENT_ENVIRONMENT: ${DEPLOYMENT_ENVIRONMENT:-local}
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - collector-data:/var/lib/otelcol
    depends_on:
      telemetry-storage-init:
        condition: service_completed_successfully
      tempo:
        condition: service_healthy
    networks:
      - telemetry
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true
    restart: unless-stopped
    stop_grace_period: 20s
    healthcheck:
      test:
        [
          "CMD",
          "/otelcol-contrib",
          "validate",
          "--config=/etc/otelcol-contrib/config.yaml",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 192M

  tempo:
    image: grafana/tempo:3.0.2
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    depends_on:
      telemetry-storage-init:
        condition: service_completed_successfully
    networks:
      - telemetry
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "/tempo", "--health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M

  telemetry-storage-init:
    image: alpine:3.22.1
    command:
      - sh
      - -c
      - chown 10001:10001 /var/lib/otelcol /var/tempo
    user: "0:0"
    network_mode: none
    volumes:
      - collector-data:/var/lib/otelcol
      - tempo-data:/var/tempo
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    security_opt:
      - no-new-privileges:true
    restart: "no"

  api-test:
    image: observability-demo-api-test:${APP_VERSION:-0.1.0}
    build:
      context: ./app
      target: test
    profiles:
      - test
    network_mode: none
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  smoke:
    image: observability-demo-api-test:${APP_VERSION:-0.1.0}
    build:
      context: ./app
      target: test
    profiles:
      - test
    command: ["python", "tests/smoke_distribution.py"]
    environment:
      EXPECTED_REPLICAS: "4"
      SMOKE_URL: http://traefik:8080/debug/instance
    depends_on:
      traefik:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - edge
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  trace-smoke:
    image: observability-demo-api-test:${APP_VERSION:-0.1.0}
    build:
      context: ./app
      target: test
    profiles:
      - test
    command: ["python", "tests/smoke_traces.py"]
    environment:
      EXPECTED_REPLICAS: "4"
      SMOKE_URL: http://traefik:8080/work?units=2
      TEMPO_URL: http://tempo:3200
    depends_on:
      traefik:
        condition: service_healthy
      api:
        condition: service_healthy
      tempo:
        condition: service_healthy
    networks:
      - edge
      - telemetry
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

networks:
  edge:
    driver: bridge
    internal: true
  ingress:
    driver: bridge
  telemetry:
    driver: bridge
    internal: true

volumes:
  collector-data:
  tempo-data:
