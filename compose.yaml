name: observability-demo

services:
  traefik:
    image: traefik:v3.7.8
    command:
      - --configFile=/etc/traefik/traefik.yaml
    ports:
      - "127.0.0.1:${HTTP_PORT:-8080}:8080"
    volumes:
      - ./observability/traefik/traefik.yaml:/etc/traefik/traefik.yaml:ro
      # Local-learning exception: this socket exposes sensitive Docker metadata.
      # A production deployment should use a restricted API proxy or native discovery.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - edge
      - ingress
      - telemetry
    depends_on:
      otel-collector:
        condition: service_healthy
    labels:
      observability.logs: "true"
      observability.service: observability-demo-edge
      observability.environment: ${DEPLOYMENT_ENVIRONMENT:-local}
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true
    restart: unless-stopped
    stop_grace_period: 35s
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

  api:
    image: observability-demo-api:${APP_VERSION:-0.1.0}
    build:
      context: ./app
      target: runtime
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
    scale: 4
    expose:
      - "8000"
    environment:
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-observability-demo-api}
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-learning}
      DEPLOYMENT_ENVIRONMENT: ${DEPLOYMENT_ENVIRONMENT:-local}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_TRACES_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_TRACES_TIMEOUT: "5"
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_METRICS_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_METRICS_TIMEOUT: "5"
      OTEL_METRIC_EXPORT_INTERVAL: "15000"
      OTEL_BSP_EXPORT_TIMEOUT: "5000"
      OTEL_BSP_SCHEDULE_DELAY: "500"
      OTEL_PROPAGATORS: tracecontext
    depends_on:
      otel-collector:
        condition: service_healthy
    networks:
      - edge
      - telemetry
    labels:
      observability.logs: "true"
      observability.service: ${OTEL_SERVICE_NAME:-observability-demo-api}
      observability.environment: ${DEPLOYMENT_ENVIRONMENT:-local}
      traefik.enable: "true"
      traefik.http.routers.api.entrypoints: web
      traefik.http.routers.api.rule: PathPrefix(`/`)
      traefik.http.routers.api.service: api
      traefik.http.routers.api-health.entrypoints: web
      traefik.http.routers.api-health.rule: Path(`/health/live`) || Path(`/health/ready`)
      traefik.http.routers.api-health.service: api
      traefik.http.routers.api-health.observability.accesslogs: "false"
      traefik.http.routers.api-health.observability.metrics: "false"
      traefik.http.routers.api-health.observability.tracing: "false"
      traefik.http.services.api.loadbalancer.server.port: "8000"
      traefik.http.services.api.loadbalancer.healthcheck.path: /health/ready
      traefik.http.services.api.loadbalancer.healthcheck.interval: 5s
      traefik.http.services.api.loadbalancer.healthcheck.timeout: 2s
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true
    restart: unless-stopped
    stop_grace_period: 35s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.153.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    environment:
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-learning}
      DEPLOYMENT_ENVIRONMENT: ${DEPLOYMENT_ENVIRONMENT:-local}
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - collector-data:/var/lib/otelcol
    depends_on:
      telemetry-storage-init:
        condition: service_completed_successfully
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    networks:
      - telemetry
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true
    restart: unless-stopped
    stop_grace_period: 20s
    healthcheck:
      test:
        [
          "CMD",
          "/otelcol-contrib",
          "validate",
          "--config=/etc/otelcol-contrib/config.yaml",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 192M

  prometheus:
    image: prom/prometheus:v3.12.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-otlp-receiver
      - --enable-feature=exemplar-storage
    volumes:
      - ./observability/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - ./observability/prometheus/tests:/etc/prometheus/tests:ro
      - prometheus-data:/prometheus
    depends_on:
      telemetry-storage-init:
        condition: service_completed_successfully
    networks:
      - telemetry
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test:
        [
          "CMD",
          "promtool",
          "check",
          "config",
          "/etc/prometheus/prometheus.yml",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M

  loki:
    image: grafana/loki:3.7.0
    command: ["-config.file=/etc/loki/config.yaml"]
    user: "10001:10001"
    volumes:
      - ./observability/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/var/loki
    depends_on:
      telemetry-storage-init:
        condition: service_completed_successfully
    networks:
      - telemetry
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 384M

  alloy:
    image: grafana/alloy:v1.16.1
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - --disable-reporting
      - /etc/alloy/config.alloy
    # Root is required here for portable access to the root-owned Docker socket.
    # Capabilities are still dropped and the root filesystem remains read-only.
    user: "0:0"
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy
      # Local-learning exception: read-only still exposes sensitive Docker metadata.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
      telemetry-storage-init:
        condition: service_completed_successfully
    networks:
      - telemetry
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true
    restart: unless-stopped
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "alloy", "fmt", "--test", "/etc/alloy/config.alloy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 192M

  grafana:
    image: grafana/grafana:13.1.1
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/json/observability-demo-service.json
      GF_PLUGINS_PLUGIN_ADMIN_ENABLED: "false"
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
      GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_EDITORS_CAN_ADMIN: "false"
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
      telemetry-storage-init:
        condition: service_completed_successfully
    networks:
      - telemetry
      - ingress
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
      - /var/log/grafana:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true
    restart: unless-stopped
    stop_grace_period: 20s
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  blackbox-exporter:
    image: quay.io/prometheus/blackbox-exporter:v0.28.0
    command: ["--config.file=/config/blackbox.yml"]
    volumes:
      - ./observability/blackbox/config.yaml:/config/blackbox.yml:ro
    networks:
      - edge
      - telemetry
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true
    restart: unless-stopped
    stop_grace_period: 15s
    healthcheck:
      test:
        [
          "CMD",
          "blackbox_exporter",
          "--config.file=/config/blackbox.yml",
          "--config.check",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  tempo:
    image: grafana/tempo:3.0.2
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    depends_on:
      telemetry-storage-init:
        condition: service_completed_successfully
    networks:
      - telemetry
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "/tempo", "--health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M

  telemetry-storage-init:
    image: alpine:3.22.1
    command:
      - sh
      - -c
      - >-
        chown 10001:10001 /var/lib/otelcol /var/tempo /var/loki
        && chown 65534:65534 /prometheus
        && chown 0:0 /var/lib/alloy
        && chown 472:0 /var/lib/grafana
        && mkdir -p /var/lib/alloy/data
        && chown 0:0 /var/lib/alloy/data
    user: "0:0"
    network_mode: none
    volumes:
      - collector-data:/var/lib/otelcol
      - tempo-data:/var/tempo
      - prometheus-data:/prometheus
      - loki-data:/var/loki
      - alloy-data:/var/lib/alloy
      - grafana-data:/var/lib/grafana
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    security_opt:
      - no-new-privileges:true
    restart: "no"

  api-test:
    image: observability-demo-api-test:${APP_VERSION:-0.1.0}
    build:
      context: ./app
      target: test
    profiles:
      - test
    network_mode: none
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  smoke:
    image: observability-demo-api-test:${APP_VERSION:-0.1.0}
    build:
      context: ./app
      target: test
    profiles:
      - test
    command: ["python", "tests/smoke_distribution.py"]
    environment:
      EXPECTED_REPLICAS: "4"
      SMOKE_URL: http://traefik:8080/debug/instance
    depends_on:
      traefik:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - edge
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  trace-smoke:
    image: observability-demo-api-test:${APP_VERSION:-0.1.0}
    build:
      context: ./app
      target: test
    profiles:
      - test
    command: ["python", "tests/smoke_traces.py"]
    environment:
      EXPECTED_REPLICAS: "4"
      SMOKE_URL: http://traefik:8080/work?units=2
      TEMPO_URL: http://tempo:3200
    depends_on:
      traefik:
        condition: service_healthy
      api:
        condition: service_healthy
      tempo:
        condition: service_healthy
    networks:
      - edge
      - telemetry
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  metrics-smoke:
    image: observability-demo-api-test:${APP_VERSION:-0.1.0}
    build:
      context: ./app
      target: test
    profiles:
      - test
    command: ["python", "tests/smoke_metrics.py"]
    environment:
      SMOKE_URL: http://traefik:8080
      PROMETHEUS_URL: http://prometheus:9090
    depends_on:
      traefik:
        condition: service_healthy
      api:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      blackbox-exporter:
        condition: service_healthy
    networks:
      - edge
      - telemetry
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  logs-smoke:
    image: observability-demo-api-test:${APP_VERSION:-0.1.0}
    build:
      context: ./app
      target: test
    profiles:
      - test
    command: ["python", "tests/smoke_logs.py"]
    environment:
      EXPECTED_REPLICAS: "4"
      SMOKE_URL: http://traefik:8080
      LOKI_URL: http://loki:3100
    depends_on:
      traefik:
        condition: service_healthy
      api:
        condition: service_healthy
      loki:
        condition: service_healthy
      alloy:
        condition: service_healthy
    networks:
      - edge
      - telemetry
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  grafana-smoke:
    image: observability-demo-api-test:${APP_VERSION:-0.1.0}
    build:
      context: ./app
      target: test
    profiles:
      - test
    command: ["python", "tests/smoke_grafana.py"]
    environment:
      GRAFANA_URL: http://grafana:3000
      SMOKE_URL: http://traefik:8080
    depends_on:
      grafana:
        condition: service_healthy
      traefik:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - edge
      - telemetry
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

networks:
  edge:
    driver: bridge
    internal: true
  ingress:
    driver: bridge
  telemetry:
    driver: bridge
    internal: true

volumes:
  collector-data:
  tempo-data:
  prometheus-data:
  loki-data:
  alloy-data:
  grafana-data:
